<!DOCTYPE html>
<html data-bs-theme="dark" lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <style>
         p {
         font-size: 1.1rem;
         }
         @keyframes fadeIn {
         from { opacity: 0; transform: translateY(-30px); }
         to   { opacity: 1; transform: translateY(0); }
         }
         .center-grid {
         display: grid;
         place-items: center;
         }
         .content-area {
         height: calc(100vh - 200px);
         }
         .define-title {
         font-size: 2.2rem;
         font-weight: 300;
         letter-spacing: 10px;
         color: #990000;
         margin-top: 1rem;
         }
         .highlight {
         color: #660000;
         }
         .highlight_box {
         background: rgb(255, 255, 255);
         padding: 1.8rem 2rem;
         border-radius: 12px;
         backdrop-filter: blur(4px);
         box-shadow: 0 0 20px rgba(0,0,0,0.25);
         margin-top: 1rem;
         }
         .page-body {
         animation: fadeIn 1s ease-out;
         }
      </style>
      {% block head %}
      {% endblock %}
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <link href="/static/icon.png" rel="icon" type="image/png">
   </head>
   <body>
      <header class="d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
         <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none" style="padding-left: 1cm;">
         <span class="fs-4">Okay. So What is Justice?</span> 
         </a>
         <ul class="nav nav-pills" style="padding-right: 3cm;">
            <li class="nav-item"><a href="/" class="nav-link active" aria-current="page">Home</a></li>
            <li class="nav-item"><a href="/what-is-justice" class="nav-link">What is Justice?</a></li>
            <li class="nav-item"><a href="/how-medieval-courts-worked" class="nav-link">How Did Medieval Courts Work?</a></li>
            <li class="nav-item"><a href="/was-medieval-justice-fair" class="nav-link">Was Medieval Justice Really Fair?</a></li>
            <li class="nav-item"><a href="/punishments-&-crimes" class="nav-link">How Where People Punished, and Why?</a></li>
         </ul>
      </header>
      <div class="container py-4">
         <div class="page-body">
         {% block content %}
         {% endblock %}
         </div>
      </div>
   </body>
</html>
